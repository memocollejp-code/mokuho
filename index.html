<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>モクホ MOKUHO</title>

<!-- PWA manifest -->
<link rel="manifest" href="./manifest.json" />

<!-- ファビコン（ブラウザタブ） -->
<link rel="icon" href="./icon.png" type="image/png" />

<!-- iOS ホーム画面アイコン -->
<link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />

<!-- Android / PWA ホーム画面アイコン -->
<link rel="icon" sizes="192x192" href="./icon-192.png" type="image/png" />

<!-- iOS Safari PWA 設定 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="モクホ" />

<!-- テーマカラー（Androidブラウザのアドレスバー） -->
<meta name="theme-color" content="#fffdfb" />

<link rel="stylesheet" href="./src/notes/style.css" />
</head>
<body>

<div id="root"></div>

<script src="./src/notes/app.js" defer></script>

<!-- Service Worker 登録 -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("./sw.js")
        .then((reg) => console.log("[SW] 登録完了:", reg.scope))
        .catch((err) => console.warn("[SW] 登録失敗:", err));
    });
  }
</script>
</body>
</html>
